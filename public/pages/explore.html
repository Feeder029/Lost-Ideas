<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore</title>
    <link rel="stylesheet" href="/public/styles/global.css" class="">
    <link rel="stylesheet" href="/public/styles/explore.css" class="">
</head>
<body>
    <div class="heading">
        <h3>● The archive</h3>
        <h1>Browse what's been left behind</h1>
        <p>Filter by drawer, then adopt whatever catches your eye.</p>
    </div>
    <div class="container">
        <div class="side-nav">
            <div class="filter-head">Category</div>
            <ul class="category">
                <li><input type="checkbox" name="All Drawers" id="all-drawers"><label for="all-drawers">All Drawers</label></li>
                <li><input type="checkbox" name="Technology" id="technology"><label for="technology">💻 Technology</label></li>
                <li><input type="checkbox" name="AI" id="ai"><label for="ai">🤖 AI</label></li>
                <li><input type="checkbox" name="Healthcare" id="healthcare"><label for="healthcare">🏥 Healthcare</label></li>
                <li><input type="checkbox" name="Business" id="business"><label for="business">💼 Business</label></li>
                <li><input type="checkbox" name="Games" id="games"><label for="games">🎮 Games</label></li>
                <li><input type="checkbox" name="Education" id="education"><label for="education">📚 Education</label></li>
                <li><input type="checkbox" name="Entertainment" id="entertainment"><label for="entertainment">🎬 Entertainment</label></li>
                <li><input type="checkbox" name="Environment" id="environment"><label for="environment">🌱 Environment</label></li>
                <li><input type="checkbox" name="Transportation" id="transportation"><label for="transportation">🚗 Transportation</label></li>
                <li><input type="checkbox" name="Food" id="food"><label for="food">🍕 Food</label></li>
                <li><input type="checkbox" name="Fashion" id="fashion"><label for="fashion">👗 Fashion</label></li>
                <li><input type="checkbox" name="Random" id="random"><label for="random">🎲 Random</label></li>
            </ul>

            <div class="filter-head">Difficulty</div>
            <ul class="difficulty">
                <li><input type="checkbox" name="All Levels" id="all-levels"><label for="all-levels">All Levels</label></li>
                <li><input type="checkbox" name="Easy" id="easy"><label for="easy">Easy</label></li>
                <li><input type="checkbox" name="Medium" id="medium"><label for="medium">Medium</label></li>
                <li><input type="checkbox" name="Hard" id="hard"><label for="hard">Hard</label></li>
            </ul>

            <div class="filter-head">Sort By</div>
            <ul class="sort">
                <li><input type="checkbox" name="Newest" id="newest"><label for="newest">Newest</label></li>
                <li><input type="checkbox" name="Oldest" id="oldest"><label for="oldest">Oldest</label></li>
                <li><input type="checkbox" name="Trending" id="trending"><label for="trending">Trending</label></li>
                <li><input type="checkbox" name="Most Adopted" id="most-adopted"><label for="most-adopted">Most Adopted</label></li>
                <li><input type="checkbox" name="Least Adopted" id="least-adopted"><label for="least-adopted">Least Adopted</label></li>
                <li><input type="checkbox" name="Built" id="built"><label for="built">Built</label></li>
                <li><input type="checkbox" name="Random" id="random"><label for="random">Random</label></li>
            </ul>
        </div>
        <div class="content">

        </div>
    </div>
</body>
</html>
